name: ATLAS Runtime Watchdog

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # every hour

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Start ATLAS processes with automatic restart
        run: |
          mkdir -p logs
          chmod +x keep_alive.sh
          nohup bash -lc 'while true; do python CONSTRUCTOR.py >> logs/constructor.log 2>&1; echo "[ATLAS] CONSTRUCTOR exited at $(date) - restarting" >> logs/constructor.log; sleep 2; done' &
          nohup bash -lc 'while true; do uvicorn COMM_LINK:app --host 0.0.0.0 --port 8000 --workers 1 --reload false >> logs/uvicorn.log 2>&1; echo "[ATLAS] Uvicorn exited at $(date) - restarting" >> logs/uvicorn.log; sleep 2; done' &
          nohup bash -lc 'python heartbeat.py >> logs/heartbeat.log 2>&1' &
          nohup bash -lc './keep_alive.sh >> logs/keep_alive.log 2>&1' &
          echo "ATLAS runtime started"
          sleep infinity
